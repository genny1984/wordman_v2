<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordman - Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕹️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    
    <div class="top-bar-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin: 0 auto 15px auto; padding: 0 10px;">
        <button onclick="window.location.href='index.html'" style="font-family: 'VT323', monospace; background: #3a3a3c; color: #fff; border: 2px solid #fff; padding: 8px 15px; font-size: 1.6rem; text-transform: uppercase; cursor: pointer; box-shadow: 4px 4px 0px #000; font-weight: bold;">⬅️ MENU</button>
        
        <button id="btn-toggle-debug" style="background: transparent; border: 1px solid #555; color: #555; font-size: 0.8rem; cursor: pointer; padding: 2px 5px; opacity: 0.5;">Debug</button>
    </div>
   
    <div id="game-container" class="hidden">
        <div id="game-layout-wrapper" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: flex-start; width: 100%; max-width: 800px; margin: 0 auto;">
            
            <div id="left-column">
                <div class="calderone-container">
                    <h2>🧪 Il Calderone</h2>
                    <div class="score-total">Punti Sessione: <span id="current-score">0</span></div>
                    <div class="streak-total">Serie Attuale: <span id="current-streak">0</span></div>
                    <ul id="words-list" style="list-style: none; margin-top: 10px;"></ul>
                </div>
            </div>

            <div id="center-column">
                <canvas id="hangman" width="200" height="250"></canvas>
                <div id="game-board"></div>
            </div>
            
        </div>
    </div>

    <div id="global-save-container" class="hidden" style="background: #1e1e1f; padding: 20px; border: 3px solid #b59f3b; border-radius: 8px; text-align: center; max-width: 360px; margin: 20px auto; box-shadow: 6px 6px 0px #000;">
        <p style="margin-bottom: 12px; color: #ffd700; font-weight: bold; font-size: 2rem; text-transform: uppercase; font-family: 'VT323', monospace; letter-spacing: 1px;">🏆 RECORD MONDIALE!</p>
        <input type="text" id="username" name="username" autocomplete="on" placeholder="TUO NOME" maxlength="10" style="font-family: 'VT323', monospace; padding: 10px; width: 80%; border: 2px solid #555; background: #111; color: white; text-align: center; text-transform: uppercase; font-size: 1.5rem; margin-bottom: 15px;">
        <br>
        <button id="btn-submit-global" style="padding: 10px 20px; font-size: 1.6rem; font-family: 'VT323', monospace; background: #538d4e; color: #ffffff; border: 2px solid #ffffff; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 4px 4px 0px #000;">INVIA RECORD</button>
    </div>

    <div id="message" style="font-family: 'VT323', monospace; font-size: 1.8rem; margin-top: 15px; min-height: 30px;"></div>
    
    <button id="restart-btn" class="hidden" style="padding: 10px 20px; font-size: 1.6rem; font-family: 'VT323', monospace; background: #538d4e; color: #ffffff; border: 2px solid #ffffff; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 4px 4px 0px #000; margin-top: 15px;">CONTINUA ➡️</button>

    <div class="keyboard">
        <div class="keyboard-row" id="row-0"></div>
        <div class="keyboard-row" id="row-1"></div>
        <div class="keyboard-row" id="row-2"></div>
    </div>

    <script src="words.js"></script>
    <script src="scoring.js"></script>
    <script src="online-leaderboard.js"></script>
    <script src="game.js" defer></script>
</body>
</html>
