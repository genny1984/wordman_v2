<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Wordman</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link rel="stylesheet" href="style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121213;
            color: #ffffff;
            font-family: 'VT323', monospace; 
            margin: 0;
            padding: 20px;
        }

        .leaderboard-container { 
            max-width: 500px; 
            margin: 0 auto; \
            text-align: center; \
        }

        h2 {
            font-size: 2.5rem;
            color: #538d4e;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #000000;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }

        th, td {
            padding: 12px;
            font-size: 1.6rem;
            border-bottom: 1px solid #3a3a3c;
            text-align: center;
        }

        th {
            background-color: #1a1a1b;
            color: #b59f3b;
            text-transform: uppercase;
        }

        /* 🔴 FIX: EVIDENZIATORE RIGIDO E COLORATO PER LA TUA RIGA RIGENERATA */
        .row-current-user {
            background-color: #2563eb !important; /* Blu elettrico arcade ad alto contrasto */
            color: #ffffff !important;
            font-weight: bold !important;
            border: 2px solid #ffd700 !important;
            text-shadow: 1px 1px 2px #000;
        }

        .dots-row td {
            color: #888;
            font-size: 1.8rem;
            padding: 5px;
            border: none;
        }

        .back-btn {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1.6rem;
            background-color: #1e1e1f;
            color: #fff;
            border: 2px solid #538d4e;
            cursor: pointer;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .back-btn:hover {
            background-color: #538d4e;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="leaderboard-container">
        <h2>🌍 CLASSIFICA MONDIALE</h2>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Giocatore</th>
                    <th>Punti</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="3" style="color: #aaa;">Caricamento in corso...</td>
                </tr>
            </tbody>
        </table>
        <button class="back-btn" onclick="window.location.href='index.html'">⬅️ Torna al Menu</button>
    </div>

    <script src="online-leaderboard.js?v=1.3"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const body = document.getElementById("leaderboard-body");
            try {
                const data = await ONLINE_LEADERBOARD.getLeaderboardData();

                if (!data) {
                    body.innerHTML = `<tr><td colspan='3' style="color: #ff4757;">Nessun dato o errore di rete.</td></tr>`;
                    return;
                }

                body.innerHTML = ""; 

                // 1. Mostra la Top 10 ordinata
                data.top10.forEach(p => {
                    const tr = document.createElement("tr");
                    if (p.isCurrentUser) {
                        tr.className = "row-current-user";
                    }
                    tr.innerHTML = `<td>${p.rank}°</td><td>${p.username} ${p.isCurrentUser ? '(Tu)' : ''}</td><td>${p.score}</td>`;
                    body.appendChild(tr);
                });

                // 2. Se l'utente è fuori dalla Top 10, genera lo stacco ed inserisce la riga in coda
                if (data.currentUserRow && data.currentUserRow.rank > 10) {
                    const dotsTr = document.createElement("tr");
                    dotsTr.className = "dots-row";
                    dotsTr.innerHTML = "<td colspan='3'>...</td>";
                    body.appendChild(dotsTr);

                    const tr = document.createElement("tr");
                    tr.className = "row-current-user";
                    tr.innerHTML = `<td>${data.currentUserRow.rank}°</td><td>${data.currentUserRow.username} (Tu)</td><td>${data.currentUserRow.score}</td>`;
                    body.appendChild(tr);
                }
            } catch (err) {
                body.innerHTML = `<tr><td colspan='3' style="color: #ff4757;">ERRORE: ${err.message}</td></tr>`;
            }
        });
    </script>
</body>
</html>
