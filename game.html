<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordman - Arcade</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    
    <div class="top-bar-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin: 0 auto 15px auto; padding: 0 10px;">
        <button onclick="window.location.href='index.html'" class="main-btn" style="max-width: 140px; margin: 0; padding: 8px 12px; font-size: 1.4rem;">⬅️ Menu</button>
        
        <div id="live-user-stats" style="font-family: 'VT323', monospace; font-size: 1.4rem; text-align: right; color: #ffffff; line-height: 1.3;">
            <div>🏆 RECORD: <span id="top-personal-best" style="color: #ffd700; font-weight: bold;">0</span></div>
            <div>🌍 RANK: <span id="top-global-rank" style="color: #60a5fa; font-weight: bold;">--</span></div>
        </div>
    </div>
       
    <div id="game-container">
        
        <div id="timer-wrapper" class="hidden">
            <div id="timer-bar"></div>
            <div id="timer-text">60s</div>
        </div>

        <div id="game-layout-wrapper">
            
            <div id="left-column">
                <div class="calderone-container">
                    <h2 style="color: #f97316; font-size: 2rem;">🧪 Il Calderone</h2>
                    <div class="score-total">Punti: <span id="current-score" style="color:#538d4e; font-weight: bold;">0</span></div>
                    <div class="streak-total">Serie: <span id="current-streak" style="color:#b59f3b; font-weight: bold;">0</span></div>
                    <ul id="words-list"></ul>
                </div>
            </div>

            <div id="center-column">
                <canvas id="hangman" width="200" height="250"></canvas>
                <div id="game-board"></div>
            </div>
            
        </div>
    </div>

    <div id="global-save-container" class="hidden" style="background: #1e1e1f; padding: 20px; border: 3px solid #b59f3b; border-radius: 8px; text-align: center; max-width: 360px; margin: 20px auto; box-shadow: 0px 0px 15px rgba(0,0,0,0.7);">
        <p style="margin-bottom: 12px; color: #ffd700; font-weight: bold; font-size: 1.8rem; text-transform: uppercase; font-family: 'VT323', monospace; letter-spacing: 1px;">🌍 RECORD MONDIALE!</p>
        <input type="text" id="leaderboard-username" placeholder="IL TUO NOME" maxlength="10" style="padding: 10px; width: 85%; font-size: 1.4rem; font-family: 'VT323', monospace; text-align: center; text-transform: uppercase; margin-bottom: 15px; background: #000; color: #fff; border: 2px solid #555; border-radius: 4px;">
        <button id="btn-submit-global" style="padding: 10px 20px; font-size: 1.5rem; font-family: 'VT323', monospace; background: #538d4e; color: #ffffff; border: 2px solid #ffffff; cursor: pointer; text-transform: uppercase; font-weight: bold; display: inline-block; width: auto; border-radius: 4px;">Invia Record</button>
    </div>

    <div id="message"></div>
    <button id="restart-btn" class="hidden main-btn" style="max-width: 300px;">Continua</button>

    <script src="words.js?v=1.3"></script>
    <script src="scoring.js?v=1.3"></script>
    <script src="online-leaderboard.js?v=1.3"></script>
    <script src="game.js?v=1.3"></script>
</body>
</html>
